<div
  class="min-h-screen flex flex-col bg-surface-50 dark:bg-surface-900 transition-colors duration-300"
>
  <app-auth-topbar></app-auth-topbar>

  <div class="flex-1 min-h-[calc(100vh-80px)] flex items-center justify-center p-4 md:p-8 relative">
    @if (currentForm() === 'none') {
      <div class="flex flex-col items-center text-center max-w-2xl select-none animate-fade-in">
        <h1 class="text-4xl md:text-6xl font-black tracking-tight text-color mb-4">
          Mantén tus recuerdos a salvo
        </h1>

        <p class="text-muted-color text-base md:text-xl mb-8 max-w-lg leading-relaxed">
          Un espacio íntimo y seguro para capturar las anécdotas, notas importantes y momentos
          dorados de tu hogar.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
          <p-button
            label="Iniciar Sesión"
            icon="pi pi-sign-in"
            styleClass="w-full sm:w-48 py-3.5 font-bold rounded-xl shadow-md"
            (onClick)="openForm('login')"
          >
          </p-button>

          <p-button
            label="Registrarme"
            icon="pi pi-user-plus"
            severity="secondary"
            styleClass="w-full sm:w-48 py-3.5 font-bold rounded-xl border border-surface-300 dark:border-surface-600"
            (onClick)="openForm('register')"
          >
          </p-button>
        </div>
      </div>
    }

    @if (currentForm() === 'login') {
      <div
        class="animated-card-wrapper w-full max-w-md bg-surface-0 dark:bg-surface-800 p-6 md:p-8 rounded-2xl shadow-xl border border-surface-200 dark:border-surface-700"
        [class.leaving]="isLeaving()"
      >
        <p-button
          icon="pi pi-arrow-left"
          [text]="true"
          severity="secondary"
          styleClass="absolute top-4 left-4"
          (onClick)="closeForm()"
        >
        </p-button>

        <app-login-form></app-login-form>
      </div>
    }

    @if (currentForm() === 'register') {
      <div
        class="animated-card-wrapper w-full max-w-lg bg-surface-0 dark:bg-surface-800 p-6 md:p-8 rounded-2xl shadow-xl border border-surface-200 dark:border-surface-700"
        [class.leaving]="isLeaving()"
      >
        <p-button
          icon="pi pi-arrow-left"
          [text]="true"
          severity="secondary"
          styleClass="absolute top-4 left-4"
          (onClick)="closeForm()"
        >
        </p-button>

        <app-register-form (registerSuccess)="closeForm(); openForm('login')"></app-register-form>
      </div>
    }
  </div>
  <app-about-info></app-about-info>
</div>
