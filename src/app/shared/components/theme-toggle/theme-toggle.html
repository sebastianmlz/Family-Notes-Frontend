<div
  class="inline-flex items-center gap-1.5 md:gap-3 px-2 md:px-3 py-1 md:py-2 bg-surface-100 dark:bg-surface-800 rounded-full border border-surface-200 dark:border-surface-700 shadow-sm"
>
  <i
    class="pi pi-sun text-base md:text-lg transition-all duration-300"
    [class.text-yellow-500]="!isDarkMode()"
    [class.text-surface-400]="isDarkMode()"
  >
  </i>

  <div
    class="flex items-center justify-center scale-80 md:scale-100 origin-center transition-transform"
  >
    <p-toggleSwitch [(ngModel)]="isDarkMode" (onChange)="onThemeChange($event)"> </p-toggleSwitch>
  </div>

  <i
    class="pi pi-moon text-base md:text-lg transition-all duration-300"
    [class.text-blue-400]="isDarkMode()"
    [class.text-surface-400]="!isDarkMode()"
  >
  </i>
</div>
